<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SimC - WoW Optimizer</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0a07;--card:#1a1510;--border:#3d2e1a;--gold:#ffd100;--gold-dim:#c4a35a;--gold-dark:#8b7355;--text:#e8dcc8;--text-dim:#9e8e72;--green:#1eff00;--red:#ff3333}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:30px 20px}
h1{font-family:'Cinzel',serif;color:var(--gold);font-size:28px;text-align:center;margin-bottom:6px;text-shadow:0 0 12px rgba(255,209,0,0.3)}
.subtitle{text-align:center;color:var(--text-dim);font-size:13px;margin-bottom:24px}
.nav{display:flex;justify-content:center;gap:10px;margin-bottom:24px}
.nav a{color:var(--gold-dim);text-decoration:none;padding:8px 18px;border:1px solid var(--border);border-radius:4px;font-size:13px;font-weight:600;transition:all .15s}
.nav a:hover,.nav a.active{border-color:var(--gold);color:var(--gold);background:rgba(255,209,0,0.05)}
.card{background:var(--card);border:1px solid var(--border);border-top:2px solid var(--gold-dark);border-radius:6px;padding:20px;margin-bottom:20px}
.card-title{font-family:'Cinzel',serif;color:var(--gold);font-size:16px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
textarea{width:100%;background:#15120d;color:var(--text);border:1px solid var(--border);border-radius:4px;padding:10px;font-family:Consolas,monospace;font-size:12px;resize:vertical}
textarea:focus{border-color:var(--gold-dark);outline:none}
.btn{display:inline-flex;align-items:center;gap:6px;padding:12px 28px;font-size:16px;font-weight:700;font-family:'Cinzel',serif;border:1px solid var(--gold-dark);border-radius:4px;cursor:pointer;transition:all .2s}
.btn-green{background:linear-gradient(180deg,#1a4a2a,#082a10);color:var(--green);border-color:#2d7a4a}
.btn-green:hover{box-shadow:0 0 14px rgba(30,255,0,0.2)}
.btn-green:disabled{opacity:0.5;cursor:not-allowed}
.progress-wrap{height:24px;background:#15120d;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:12px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#5a4a0a,#ffd100,#b8960a);background-size:200% 100%;animation:shimmer 2s linear infinite;border-radius:12px;transition:width .4s;width:0}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.output{background:#0a0804;color:#a0a0a0;border:1px solid var(--border);border-radius:4px;padding:12px;font-family:Consolas,monospace;font-size:11px;max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.dps-big{font-family:'Cinzel',serif;font-size:56px;font-weight:900;color:var(--green);text-shadow:0 0 20px rgba(30,255,0,0.4);text-align:center;margin:20px 0 5px}
.dps-label{text-align:center;color:var(--text-dim);font-size:14px;margin-bottom:20px}
.stat-bar{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.stat-bar .name{width:120px;font-size:13px;font-weight:600;text-align:right}
.stat-bar .bar{flex:1;height:22px;background:#15120d;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.stat-bar .fill{height:100%;border-radius:4px;transition:width .5s}
.stat-bar .val{width:55px;font-size:13px;font-weight:700}
.pawn-box{margin-top:16px;padding:12px;background:#15120d;border:1px solid var(--gold-dark);border-radius:4px}
.pawn-box .lbl{font-family:'Cinzel',serif;color:var(--gold-dim);font-size:12px;margin-bottom:6px}
.pawn-box input{width:100%;background:#0a0804;color:var(--gold);border:1px solid var(--border);border-radius:3px;padding:8px;font-family:Consolas,monospace;font-size:11px}
.pawn-box button{margin-top:6px;padding:5px 14px;font-size:12px;background:linear-gradient(180deg,#3a2e1e,#1e1810);color:var(--gold-dim);border:1px solid var(--gold-dark);border-radius:3px;cursor:pointer}
.hidden{display:none}
.info{font-size:12px;color:var(--text-dim);font-style:italic;margin-bottom:10px}
.report-link{text-align:center;margin-top:16px}
.report-link a{color:var(--gold);text-decoration:none;font-weight:600}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:4px}
</style>
</head>
<body>
<div class="container">
  <h1>SimC Web</h1>
  <div class="subtitle">Simulazione completa con output live, Stat Weights e Pawn</div>
  <div class="nav">
    <a href="/">Top Gear</a>
    <a href="/sim.html" class="active">SimC Web</a>
  </div>

  <div class="card">
    <div class="card-title">Incolla il profilo /simc</div>
    <div class="info">In WoW scrivi <strong>/simc</strong>, copia tutto e incolla qui. La simulazione calcola DPS, Stat Weights e genera la Pawn string.</div>
    <textarea id="profileInput" rows="10" placeholder="Incolla qui la stringa /simc..."></textarea>
  </div>

  <div class="card" style="text-align:center">
    <button class="btn btn-green" id="btnSim" onclick="startSim()">Simula</button>
    <div class="progress-wrap hidden" id="progressWrap"><div class="progress-fill" id="progressBar"></div></div>
    <div class="hidden" id="progressText" style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-top:6px"><span id="pct">0%</span><span id="statusLabel">In attesa...</span></div>
  </div>

  <div class="card hidden" id="outputCard">
    <div class="card-title">Output Live</div>
    <div class="output" id="liveOutput"></div>
  </div>

  <div class="card hidden" id="resultCard">
    <div class="dps-big" id="dpsValue">0</div>
    <div class="dps-label">DPS simulato</div>
    <div id="statBars"></div>
    <div class="pawn-box hidden" id="pawnBox">
      <div class="lbl">Pawn Import String</div>
      <input type="text" id="pawnStr" readonly onclick="this.select()">
      <button onclick="navigator.clipboard.writeText(document.getElementById('pawnStr').value).then(function(){alert('Copiato!')})">Copia</button>
    </div>
    <div class="report-link" id="reportLink"></div>
  </div>
</div>

<script>
var STAT_COLORS = {Str:'#ffd100',Agi:'#ffd100',Int:'#ffd100',Crit:'#bf616a',Haste:'#ebcb8b',Mastery:'#a335ee',Vers:'#1eff00',Wdps:'#c4a35a',WOHdps:'#c4a35a'};
var STAT_NAMES = {Str:'Strength',Agi:'Agility',Int:'Intellect',Crit:'Critical Strike',Haste:'Haste',Mastery:'Mastery',Vers:'Versatility',Wdps:'Weapon DPS',WOHdps:'OH Weapon DPS'};

function startSim() {
  var text = document.getElementById('profileInput').value.trim();
  if (!text) return;

  document.getElementById('btnSim').disabled = true;
  document.getElementById('progressWrap').classList.remove('hidden');
  document.getElementById('progressText').classList.remove('hidden');
  document.getElementById('progressText').style.display = 'flex';
  document.getElementById('outputCard').classList.remove('hidden');
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('liveOutput').textContent = '';
  document.getElementById('progressBar').style.width = '5%';
  document.getElementById('pct').textContent = '0%';
  document.getElementById('statusLabel').textContent = 'Invio...';

  fetch('/api/jobs', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ profile: text })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.error) { document.getElementById('statusLabel').textContent = 'Errore: ' + data.error; document.getElementById('btnSim').disabled = false; return; }
    streamJob(data.job_id);
  }).catch(function(e) {
    document.getElementById('statusLabel').textContent = 'Errore: ' + e.message;
    document.getElementById('btnSim').disabled = false;
  });
}

function streamJob(jobId) {
  var evtSource = new EventSource('/api/jobs/' + jobId + '/stream');
  var outputEl = document.getElementById('liveOutput');

  evtSource.onmessage = function(event) {
    try {
      var data = JSON.parse(event.data);

      if (data.type === 'output') {
        outputEl.textContent += data.text;
        outputEl.scrollTop = outputEl.scrollHeight;
        if (data.progress) {
          document.getElementById('progressBar').style.width = data.progress + '%';
          document.getElementById('pct').textContent = data.progress + '%';
          document.getElementById('statusLabel').textContent = 'Simulazione in corso...';
        }
      }

      if (data.type === 'complete') {
        evtSource.close();
        document.getElementById('btnSim').disabled = false;
        document.getElementById('progressBar').style.width = '100%';
        document.getElementById('pct').textContent = '100%';
        document.getElementById('statusLabel').textContent = data.status === 'done' ? 'Completata in ' + (data.duration ? data.duration.toFixed(1) + 's' : '?') : 'Errore';

        if (data.status === 'done') {
          document.getElementById('resultCard').classList.remove('hidden');
          document.getElementById('dpsValue').textContent = data.dps ? data.dps.toLocaleString() : '?';

          // Stat weights
          if (data.scaleFactors) {
            var entries = [];
            var maxW = 0;
            Object.keys(data.scaleFactors).forEach(function(k) {
              var v = data.scaleFactors[k];
              if (v > 0 && STAT_NAMES[k]) { entries.push({key:k,val:v}); if (v > maxW) maxW = v; }
            });
            entries.sort(function(a,b) { return b.val - a.val; });
            document.getElementById('statBars').innerHTML = entries.map(function(e) {
              var pct = maxW > 0 ? Math.round(e.val / maxW * 100) : 0;
              var color = STAT_COLORS[e.key] || '#c4a35a';
              return '<div class="stat-bar"><div class="name" style="color:'+color+'">'+(STAT_NAMES[e.key]||e.key)+'</div><div class="bar"><div class="fill" style="width:'+pct+'%;background:'+color+'"></div></div><div class="val" style="color:'+color+'">'+e.val.toFixed(2)+'</div></div>';
            }).join('');
          }

          // Pawn
          if (data.pawnString) {
            document.getElementById('pawnBox').classList.remove('hidden');
            document.getElementById('pawnStr').value = data.pawnString;
          }

          // Report
          if (data.htmlReport) {
            document.getElementById('reportLink').innerHTML = '<a href="' + data.htmlReport + '" target="_blank">Apri Report SimC Completo</a>';
          }
        }
      }
    } catch(e) {
      outputEl.textContent += event.data + '\n';
    }
  };

  evtSource.onerror = function() {
    evtSource.close();
    document.getElementById('btnSim').disabled = false;
    document.getElementById('statusLabel').textContent = 'Connessione persa';
  };
}
</script>
</body>
</html>
