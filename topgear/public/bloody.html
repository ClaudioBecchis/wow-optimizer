<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Bloodytools - WoW Optimizer</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0a07;--card:#1a1510;--border:#3d2e1a;--gold:#ffd100;--gold-dim:#c4a35a;--gold-dark:#8b7355;--text:#e8dcc8;--text-dim:#9e8e72;--green:#1eff00;--red:#ff3333}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:30px 20px}
h1{font-family:'Cinzel',serif;color:var(--gold);font-size:28px;text-align:center;margin-bottom:6px;text-shadow:0 0 12px rgba(255,209,0,0.3)}
.subtitle{text-align:center;color:var(--text-dim);font-size:13px;margin-bottom:24px}
.nav{display:flex;justify-content:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.nav a{color:var(--gold-dim);text-decoration:none;padding:8px 18px;border:1px solid var(--border);border-radius:4px;font-size:13px;font-weight:600;transition:all .15s}
.nav a:hover,.nav a.active{border-color:var(--gold);color:var(--gold);background:rgba(255,209,0,0.05)}
.card{background:var(--card);border:1px solid var(--border);border-top:2px solid var(--gold-dark);border-radius:6px;padding:20px;margin-bottom:20px}
.card-title{font-family:'Cinzel',serif;color:var(--gold);font-size:16px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
select,button{background:#15120d;color:var(--text);border:1px solid var(--border);border-radius:4px;padding:8px 12px;font-size:13px;cursor:pointer;outline:none}
select:focus{border-color:var(--gold-dark)}
.btn{font-family:'Cinzel',serif;font-weight:700;padding:10px 24px;font-size:14px;background:linear-gradient(180deg,#1a4a2a,#082a10);color:var(--green);border-color:#2d7a4a;transition:all .2s}
.btn:hover{box-shadow:0 0 14px rgba(30,255,0,0.2)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.controls label{color:var(--text-dim);font-size:12px;font-weight:600}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:5px;padding:3px 0}
.bar-row:hover{background:rgba(139,115,85,0.08);border-radius:4px}
.bar-rank{width:28px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--gold-dark);text-align:center}
.bar-row:first-child .bar-rank{color:var(--gold)}
.bar-name{width:230px;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:20px;background:#15120d;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s;background:linear-gradient(90deg,var(--gold-dark),var(--gold))}
.bar-row:first-child .bar-fill{background:linear-gradient(90deg,#1a6a2a,var(--green))}
.bar-dps{width:75px;font-size:12px;font-weight:700;text-align:right;color:var(--gold)}
.bar-row:first-child .bar-dps{color:var(--green)}
.bar-delta{width:65px;font-size:11px;text-align:right;color:var(--text-dim)}
.loading{text-align:center;padding:30px;color:var(--text-dim);font-size:14px}
.status-msg{font-size:12px;padding:8px 12px;border-radius:4px;margin-top:10px}
.existing{margin-bottom:8px;padding:8px 12px;background:#15120d;border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s}
.existing:hover{border-color:var(--gold-dark)}
.existing .name{flex:1;font-weight:600;font-size:13px}
.existing .date{font-size:11px;color:var(--text-dim)}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:4px}
</style>
</head>
<body>
<div class="container">
  <h1>Bloodytools</h1>
  <div class="subtitle">Confronto automatico trinket, talenti, razze, stat - powered by SimC</div>
  <div class="nav">
    <a href="/">Top Gear</a>
    <a href="/sim.html">SimC Web</a>
    <a href="/bloody.html" class="active">Bloodytools</a>
  </div>

  <div class="card">
    <div class="card-title">Lancia Simulazione</div>
    <div class="controls">
      <label>Tipo:</label>
      <select id="simType">
        <option value="trinkets">Trinkets</option>
        <option value="races">Razze</option>
        <option value="talents">Talenti</option>
        <option value="talent_addition">Talent Addition</option>
        <option value="secondary_distributions">Stat Distribution</option>
        <option value="weapon_enchantments">Weapon Enchants</option>
        <option value="tier_set">Tier Set</option>
      </select>
      <label>Classe:</label>
      <select id="simClass">
        <option value="death_knight">Death Knight</option>
        <option value="demon_hunter">Demon Hunter</option>
        <option value="druid">Druid</option>
        <option value="evoker">Evoker</option>
        <option value="hunter">Hunter</option>
        <option value="mage">Mage</option>
        <option value="monk">Monk</option>
        <option value="paladin">Paladin</option>
        <option value="priest">Priest</option>
        <option value="rogue">Rogue</option>
        <option value="shaman" selected>Shaman</option>
        <option value="warlock">Warlock</option>
        <option value="warrior">Warrior</option>
      </select>
      <label>Spec:</label>
      <select id="simSpec">
        <option value="enhancement" selected>Enhancement</option>
        <option value="elemental">Elemental</option>
        <option value="restoration">Restoration</option>
      </select>
      <label>Fight:</label>
      <select id="simFight">
        <option value="patchwerk">Patchwerk</option>
      </select>
    </div>
    <button class="btn" id="btnRun" onclick="runBloody()">Avvia Simulazione</button>
    <div id="runStatus" class="status-msg" style="display:none"></div>
  </div>

  <div class="card">
    <div class="card-title">Risultati Disponibili</div>
    <div id="existingResults"><div class="loading">Caricamento...</div></div>
  </div>

  <div class="card" id="chartCard" style="display:none">
    <div class="card-title" id="chartTitle">Risultati</div>
    <div id="chartContainer"></div>
  </div>
</div>

<script>
// Populate specs based on class
var specMap = {
  death_knight: ['blood','frost','unholy'],
  demon_hunter: ['havoc','vengeance'],
  druid: ['balance','feral','guardian','restoration'],
  evoker: ['devastation','preservation','augmentation'],
  hunter: ['beast_mastery','marksmanship','survival'],
  mage: ['arcane','fire','frost'],
  monk: ['brewmaster','mistweaver','windwalker'],
  paladin: ['holy','protection','retribution'],
  priest: ['discipline','holy','shadow'],
  rogue: ['assassination','outlaw','subtlety'],
  shaman: ['elemental','enhancement','restoration'],
  warlock: ['affliction','demonology','destruction'],
  warrior: ['arms','fury','protection']
};

document.getElementById('simClass').onchange = function() {
  var specs = specMap[this.value] || [];
  var sel = document.getElementById('simSpec');
  sel.innerHTML = specs.map(function(s) { return '<option value="' + s + '">' + s.charAt(0).toUpperCase() + s.slice(1).replace('_',' ') + '</option>'; }).join('');
};

function runBloody() {
  var type = document.getElementById('simType').value;
  var cls = document.getElementById('simClass').value;
  var spec = document.getElementById('simSpec').value;
  var fight = document.getElementById('simFight').value;

  document.getElementById('btnRun').disabled = true;
  showStatus('Simulazione avviata... puo\' richiedere alcuni minuti', '#c4a35a');

  fetch('/api/bloody/run', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({type:type, class:cls, spec:spec, fight:fight})
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.error) { showStatus('Errore: ' + data.error, 'var(--red)'); document.getElementById('btnRun').disabled = false; return; }
    pollBloody(data.jobId, type, cls, spec, fight);
  }).catch(function(e) {
    showStatus('Errore: ' + e.message, 'var(--red)');
    document.getElementById('btnRun').disabled = false;
  });
}

function pollBloody(jobId, type, cls, spec, fight) {
  var interval = setInterval(function() {
    fetch('/api/bloody/status/' + jobId).then(function(r) { return r.json(); }).then(function(job) {
      showStatus('Simulazione in corso... (' + job.outputLines + ' righe output)', '#c4a35a');
      if (job.status === 'done' || job.status === 'error') {
        clearInterval(interval);
        document.getElementById('btnRun').disabled = false;
        if (job.status === 'done') {
          showStatus('Completata in ' + (job.duration ? job.duration.toFixed(0) + 's' : '?'), 'var(--green)');
          loadExisting();
          if (job.resultUrl) loadChart(job.resultUrl, type);
        } else {
          showStatus('Errore: ' + job.error, 'var(--red)');
        }
      }
    }).catch(function() {});
  }, 3000);
}

function showStatus(msg, color) {
  var el = document.getElementById('runStatus');
  el.style.display = 'block';
  el.textContent = msg;
  el.style.color = color;
  el.style.borderColor = color;
}

function loadExisting() {
  fetch('/api/bloody/results').then(function(r) { return r.json(); }).then(function(files) {
    if (!files.length) { document.getElementById('existingResults').innerHTML = '<div class="loading">Nessun risultato. Lancia una simulazione.</div>'; return; }
    document.getElementById('existingResults').innerHTML = files.map(function(f) {
      var name = f.file.replace('.json','').replace(/_/g,' ').replace(/\b\w/g, function(c){return c.toUpperCase()});
      return '<div class="existing" onclick="loadChart(\'' + f.url + '\',\'' + f.file.split('_').pop().replace('.json','') + '\')">'
        + '<div class="name">' + name + '</div>'
        + '</div>';
    }).join('');
  }).catch(function() { document.getElementById('existingResults').innerHTML = '<div class="loading">Errore caricamento</div>'; });
}

function loadChart(url, type) {
  document.getElementById('chartCard').style.display = 'block';
  document.getElementById('chartContainer').innerHTML = '<div class="loading">Caricamento...</div>';

  fetch(url).then(function(r) { return r.json(); }).then(function(data) {
    document.getElementById('chartTitle').textContent = data.title || 'Risultati';
    var items = [];
    Object.keys(data.data).forEach(function(name) {
      var vals = data.data[name];
      var ilvls = Object.keys(vals).sort(function(a,b){return parseInt(b)-parseInt(a)});
      items.push({name:name, dps:vals[ilvls[0]], ilvl:ilvls[0]});
    });
    items.sort(function(a,b){return b.dps-a.dps});

    var maxDps = items[0] ? items[0].dps : 1;
    var minDps = items[items.length-1] ? items[items.length-1].dps : 0;

    document.getElementById('chartContainer').innerHTML = items.map(function(t,i) {
      var pct = maxDps > minDps ? Math.max(5, (t.dps-minDps)/(maxDps-minDps)*100) : 100;
      var delta = i === 0 ? 'BEST' : Math.round(t.dps - maxDps).toLocaleString();
      var dColor = i === 0 ? 'color:var(--green)' : 'color:var(--red)';
      return '<div class="bar-row"><div class="bar-rank">'+(i+1)+'</div><div class="bar-name" title="'+esc(t.name)+' (ilvl '+t.ilvl+')">'+esc(t.name)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div><div class="bar-dps">'+Math.round(t.dps).toLocaleString()+'</div><div class="bar-delta" style="'+dColor+'">'+delta+'</div></div>';
    }).join('');

    document.getElementById('chartCard').scrollIntoView({behavior:'smooth'});
  }).catch(function(e) {
    document.getElementById('chartContainer').innerHTML = '<div class="loading" style="color:var(--red)">Errore: ' + e.message + '</div>';
  });
}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

loadExisting();
</script>
</body>
</html>
